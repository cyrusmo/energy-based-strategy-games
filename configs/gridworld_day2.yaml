seed: 23

env:
  grid_size: 10
  max_steps: 35
  attacker_start: [0, 0]
  defender_start: [9, 9]
  goal_pos: [9, 0]
  catch_radius: 0

training:
  iterations: 4
  candidate_strategies: 7
  strategy_dim: 8

policy:
  hidden_dim: 64

ebm:
  hidden_dim: 64
  langevin_steps: 8
  langevin_step_size: 0.02

world_model:
  hidden_dim: 64

evaluator:
  episodes_per_opponent: 1

updates:
  policy_lr: 0.003
  ebm_lr: 0.001
  world_model_lr: 0.001
  gamma: 0.99
  entropy_coef: 0.01
  grad_clip_norm: 1.0
  ebm_batch_size: 8
  positive_quantile: 0.5
  train_policy: true
  train_ebm: true
  train_world_model: true
