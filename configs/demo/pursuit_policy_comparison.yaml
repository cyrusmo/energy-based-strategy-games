num_seeds: 20
seed_start: 0

env:
  grid_size: [9, 9]
  num_evaders: 2
  num_pursuers: 1
  max_steps: 18
  catch_radius: 0
  pursuer_starts:
    - [4, 4]
  evader_starts:
    - [4, 6]
    - [0, 8]
  evader_goals:
    - [8, 8]
    - [8, 0]

policies:
  pursuers:
    - pursuer_greedy_nearest
    - pursuer_random
  evaders:
    - evader_flee_nearest
    - evader_goal_directed
    - evader_feint
    - evader_random
  feint_steps: 3

empirical_game:
  eta: 1.0

output:
  dir: outputs/public/pursuit_demo
  json_filename: policy_comparison.json
  csv_filename: policy_comparison.csv
  save_csv: true
