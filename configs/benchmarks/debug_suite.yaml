suite:
  name: debug_benchmark_suite
  output_dir: outputs/public/benchmarks
  run_name: debug_suite
  write_artifacts: true

benchmarks:
  - env_id: custom_gridworld_v0
    seeds: [0, 1]
    baselines:
      - random_policy
      - direct_goal_heuristic
      - strategy_loop
    env:
      grid_size: 5
      max_steps: 8
      attacker_start: [0, 0]
      defender_start: [4, 4]
      goal_pos: [4, 0]
      catch_radius: 0
    training:
      iterations: 1
      candidate_strategies: 2
      strategy_dim: 4
    ebm:
      hidden_dim: 8
      langevin_steps: 1
      langevin_step_size: 0.02
    evaluator:
      episodes_per_opponent: 1
    updates:
      ebm_batch_size: 2
